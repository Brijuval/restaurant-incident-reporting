services:
  # Backend Web Service (Django)
  - type: web
    name: incident-reporting-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn incident_project.wsgi:application"
    rootDir: backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: incident-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # User configures manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false # User configures manually in Render dashboard

  # Frontend Static Site (React/Vite)
  - type: web
    name: incident-reporting-frontend
    env: static
    buildCommand: "npm install && npm run build"
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: incident-reporting-backend
          type: web
          property: host

databases:
  - name: incident-db
    plan: free
